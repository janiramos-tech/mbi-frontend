<mat-toolbar color="primary">
  <button mat-icon-button (click)="drawer.toggle()" aria-label="menu">
    <mat-icon>menu</mat-icon>
  </button>
  <span>Frameworks para o Front-end de Aplicações Web</span>
  <span class="example-spacer"></span>
</mat-toolbar>

<mat-drawer-container class="example-container" autosize>
  <mat-drawer #drawer class="example-sidenav" opened="true" mode="side" position="start">
    <mat-nav-list class="overflow-y-auto overflow-x-hidden">
      <a mat-list-item routerLink="">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </a>
      <a mat-list-item routerLink="/state">
        <mat-icon>analytics</mat-icon>
        <span>Estados</span>
      </a>
      <a mat-list-item routerLink="/produto">
        <mat-icon>analytics</mat-icon>
        <span>Produto</span>
      </a>
    </mat-nav-list>
  </mat-drawer>
  <mat-drawer-content>
    <div style="min-height: 600px;text-align: center;">
      <router-outlet></router-outlet>
    </div>

  </mat-drawer-content>

</mat-drawer-container>
